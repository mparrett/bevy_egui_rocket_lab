<html>
<head>
    <meta charset="UTF-8" />
    <style>
        html,
        body {
          background: black;
          width: 100%;
          height: 100%;
          margin: 0px;
          border: 0;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #top-bar {
          background: #1a1a1a;
          color: #aaa;
          height: 32px;
          min-height: 32px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 12px;
          font-size: 13px;
          border-bottom: 1px solid #333;
        }
        #top-bar .title {
          color: #ccc;
          font-weight: 600;
        }
        #top-bar a {
          color: #888;
          text-decoration: none;
        }
        #top-bar a:hover {
          color: #fff;
        }
        canvas {
          flex: 1;
        }
        #loading {
          position: absolute;
          top: 33px;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: black;
          z-index: 10;
        }
        #loading .spinner {
          width: 32px;
          height: 32px;
          border: 3px solid #333;
          border-top-color: #aaa;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-right: 12px;
        }
        #loading .label {
          color: #888;
          font-size: 15px;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <span class="title">Bevy Rocket Lab</span>
      <a href="https://github.com/mparrett/bevy_egui_rocket_lab" target="_blank" rel="noopener">GitHub</a>
    </div>
    <div id="loading">
      <div class="spinner"></div>
      <span class="label">Loading...</span>
    </div>
  </body>

  <script type="module">
    const hasWebGPU = "gpu" in navigator;
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const useWebGPU = hasWebGPU && !isIOS;

    const variant = useWebGPU ? "webgpu" : "webgl";
    const label = document.querySelector("#loading .label");
    if (label) label.textContent = `Loading (${variant})…`;

    const mod = useWebGPU
      ? "./out-webgpu/bevy-rocket-lab.js"
      : "./out-webgl/bevy-rocket-lab.js";
    const { default: init } = await import(mod);
    await init();
    document.getElementById("loading").remove();
  </script>
</html>
