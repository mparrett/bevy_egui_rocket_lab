<html>
<head>
    <meta charset="UTF-8" />
    <style>
        html,
        body {
          background: black;
          width: 100%;
          height: 100%;
          margin: 0px;
          border: 0;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #top-bar {
          background: #1a1a1a;
          color: #aaa;
          height: 32px;
          min-height: 32px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 12px;
          font-size: 13px;
          border-bottom: 1px solid #333;
        }
        #top-bar .title {
          color: #ccc;
          font-weight: 600;
        }
        #top-bar a {
          color: #888;
          text-decoration: none;
        }
        #top-bar a:hover {
          color: #fff;
        }
        #top-bar .active {
          color: #fff;
          font-weight: 600;
        }
        #top-bar .sep {
          color: #555;
          margin: 0 2px;
        }
        #top-bar .links {
          display: flex;
          gap: 12px;
          align-items: center;
        }
        canvas {
          flex: 1;
        }
        #loading {
          position: absolute;
          top: 33px;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: black;
          z-index: 10;
          gap: 16px;
        }
        #loading .status {
          display: flex;
          align-items: center;
        }
        #loading .spinner {
          display: none;
          width: 32px;
          height: 32px;
          border: 3px solid #333;
          border-top-color: #aaa;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
          margin-right: 12px;
        }
        #loading .label {
          color: #888;
          font-size: 15px;
        }
        #play-btn {
          color: #6c6;
          font-weight: 600;
          font-size: 16px;
          background: none;
          border: 1px solid #6c6;
          border-radius: 6px;
          padding: 8px 24px;
          cursor: pointer;
        }
        #play-btn:hover {
          color: #8f8;
          border-color: #8f8;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <span class="title">Bevy Rocket Lab</span>
      <div class="links">
        <span id="profile-links">
          <a id="link-release" href="?profile=release">release</a>
          <span class="sep">/</span>
          <a id="link-dev" href="?profile=dev">dev</a>
        </span>
        <span>
          <a id="link-webgpu" href="?backend=webgpu">webgpu</a>
          <span class="sep">/</span>
          <a id="link-webgl" href="?backend=webgl">webgl</a>
        </span>
        <a href="https://github.com/mparrett/bevy_egui_rocket_lab" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
    <div id="loading">
      <span class="label"></span>
      <button id="play-btn">&#9654; Load</button>
      <div class="status">
        <div class="spinner"></div>
      </div>
    </div>
  </body>

  <script type="module">
    const params = new URLSearchParams(location.search);

    function buildUrl(key, value) {
      const p = new URLSearchParams(location.search);
      p.set(key, value);
      return '?' + p.toString();
    }

    document.getElementById('link-release').href = buildUrl('profile', 'release');
    document.getElementById('link-dev').href = buildUrl('profile', 'dev');
    document.getElementById('link-webgpu').href = buildUrl('backend', 'webgpu');
    document.getElementById('link-webgl').href = buildUrl('backend', 'webgl');

    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (!isLocal) {
      document.getElementById('profile-links').style.display = 'none';
    }

    const forceBackend = params.get("backend");
    const hasWebGPU = "gpu" in navigator;
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const useWebGPU = forceBackend === "webgl" ? false
      : forceBackend === "webgpu" ? true
      : hasWebGPU && !isIOS;

    const profile = isLocal && params.get("profile") === "dev" ? "dev" : "release";
    const variant = useWebGPU ? "webgpu" : "webgl";
    const dir = profile === "dev" ? `out-dev-${variant}` : `out-${variant}`;

    document.getElementById(`link-${profile}`).classList.add('active');
    document.getElementById(`link-${variant}`).classList.add('active');

    const label = document.querySelector("#loading .label");
    label.textContent = isLocal ? `${variant}, ${profile}` : variant;

    async function launch() {
      document.getElementById('play-btn').style.display = 'none';
      label.textContent = isLocal ? `Loading (${variant}, ${profile})…` : `Loading (${variant})…`;
      document.querySelector("#loading .spinner").style.display = 'block';

      const showAt = Date.now();
      const mod = `./${dir}/bevy-rocket-lab.js`;
      const { default: init } = await import(mod);
      await init();
      const elapsed = Date.now() - showAt;
      if (elapsed < 1000) await new Promise(r => setTimeout(r, 1000 - elapsed));
      document.getElementById("loading").remove();
    }

    document.getElementById('play-btn').addEventListener('click', launch);
  </script>
</html>
