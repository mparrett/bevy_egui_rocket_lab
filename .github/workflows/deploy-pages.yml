name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.114

      - name: Build WASM (WebGPU)
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown --features web_webgpu

      - name: Run wasm-bindgen (WebGPU)
        run: wasm-bindgen --out-dir ./out-webgpu/ --target web ./target/wasm32-unknown-unknown/wasm-release/bevy-rocket-lab.wasm

      - name: Build WASM (WebGL2)
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown --features web_webgl

      - name: Run wasm-bindgen (WebGL2)
        run: wasm-bindgen --out-dir ./out-webgl/ --target web ./target/wasm32-unknown-unknown/wasm-release/bevy-rocket-lab.wasm

      - name: Install wasm-opt
        run: |
          curl -L https://github.com/WebAssembly/binaryen/releases/download/version_121/binaryen-version_121-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_121/bin" >> $GITHUB_PATH

      - name: Optimize WASM binaries
        run: |
          wasm-opt -Oz --all-features -o out-webgpu/bevy-rocket-lab_bg.wasm out-webgpu/bevy-rocket-lab_bg.wasm
          wasm-opt -Oz --all-features -o out-webgl/bevy-rocket-lab_bg.wasm out-webgl/bevy-rocket-lab_bg.wasm

      - name: Assemble deploy directory
        run: |
          mkdir -p staging
          cp index.html staging/
          cp -r out-webgpu/ staging/out-webgpu/
          cp -r out-webgl/ staging/out-webgl/
          mkdir -p staging/assets
          cp -r assets/audio/ staging/assets/audio/
          cp -r assets/textures/ staging/assets/textures/
          cp -r assets/fonts/ staging/assets/fonts/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
